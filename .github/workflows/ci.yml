name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "peps/**"
      - "docs/**/*.md"
      - "LICENSE"
      - ".vscode/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "peps/**"
      - "docs/**/*.md"
      - "LICENSE"
      - ".vscode/**"
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-dist
          path: packages/*/dist
          retention-days: 1

  test:
    name: Test (shard ${{ matrix.shard }})
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        shard: ["1/3", "2/3", "3/3"]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-dist
          path: packages

      - name: Test
        run: pnpm test -- --shard=${{ matrix.shard }}

  test-pr:
    name: Test (PR — selective)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-dist
          path: packages

      - name: Detect changes and run tests
        run: |
          BASE="origin/${{ github.base_ref }}"
          CHANGED=$(git diff --name-only "$BASE"...HEAD)

          # If root-level config files changed, run full suite
          if echo "$CHANGED" | grep -qE '^(vitest\.config|tsconfig|package\.json|pnpm-lock)'; then
            echo "Root config changed — running full test suite"
            pnpm test
          else
            echo "Running selective tests for changed packages"
            # Run tests for changed packages and their dependents
            pnpm --filter "...[$BASE]" test || true
            # Always run the integration test as a safety net
            pnpm vitest run tests/playground-examples.test.ts
          fi

  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-dist
          path: packages

      - name: Format Check
        run: pnpm run format:check

      - name: Typecheck
        run: pnpm run typecheck

  test-vscode:
    name: VS Code Extension Tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - run: pnpm install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-dist
          path: packages

      - name: VS Code Unit Tests
        run: pnpm --filter @typesugar/vscode test:unit

      - name: VS Code Integration Tests
        run: xvfb-run -a pnpm --filter @typesugar/vscode test:integration

      - name: TS Plugin Tests
        run: pnpm --filter @typesugar/ts-plugin test

  publish-dry-run:
    name: Publish (dry run)
    runs-on: ubuntu-latest
    needs: [test, test-pr, lint, test-vscode]
    if: |
      !cancelled() &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      (needs.test-pr.result == 'success' || needs.test-pr.result == 'skipped') &&
      needs.lint.result == 'success' &&
      needs.test-vscode.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-dist
          path: packages

      - name: Publish (dry run)
        run: pnpm -r --filter '!@typesugar/vscode' publish --dry-run --no-git-checks
