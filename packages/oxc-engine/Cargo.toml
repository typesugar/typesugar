[package]
name = "oxc-engine"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Rust-native macro engine for typesugar using oxc"

[lib]
crate-type = ["cdylib"]

[dependencies]
# napi-rs bindings
napi = { version = "2", default-features = false, features = ["napi8", "serde-json"] }
napi-derive = "2"

# oxc toolchain
oxc_parser = "0.49"
oxc_ast = "0.49"
oxc_span = "0.49"
oxc_allocator = "0.49"
oxc_codegen = "0.49"
oxc_semantic = "0.49"
oxc_sourcemap = "1.0"

# serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[build-dependencies]
napi-build = "2"

[profile.release]
lto = true
strip = "symbols"
